version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dpt_postgres
    restart: always
    environment:
      POSTGRES_USER: dpt_user
      POSTGRES_PASSWORD: dpt_password
      POSTGRES_DB: dpt
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
